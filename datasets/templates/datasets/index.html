{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Explorer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/main.css' %}">

</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">Data Explorer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Strona Główna</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'upload_csv' %}">Wgraj CSV</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'list' %}">Lista plików</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-container text-center">
        
        <div class="row justify-content-center">
            <div class="col-md-8 bg-white p-5 rounded shadow-sm" data-aos="fade-up">
                
                {% block content %}
                    <h3 class="display-6 mb-4">System eksploracji plików</h3>
                    <p class="lead text-muted">Wybierz opcję z menu powyżej. Wkrótce pojawią się tutaj Twoje dane.</p>
                    
                    <a href="{% url 'upload_csv' %}" class="btn btn-primary btn-lg mt-3">Zacznij teraz</a>
                {% endblock %}

            </div>
        </div>

        <footer class="mt-5 py-4 border-top">
            <p class="text-secondary small">&copy; Data Explorer 2026</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1000, // czas trwania animacji w ms
            once: true      // animacja wykona się tylko raz przy przewijaniu
        });
    </script>

</body>
</html>
